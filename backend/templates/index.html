<!DOCTYPE html>
<html>
<head>
    <title>Smart Security Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .card {
            background: #222;
            margin: 20px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .time {
            color: #aaa;
            font-size: 14px;
        }

        .status {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🚨 Smart Security Dashboard</h1>

<div id="alerts"></div>

<script>
async function loadAlerts() {
    const response = await fetch('/alerts');
    const data = await response.json();

    const container = document.getElementById('alerts');
    container.innerHTML = "";

    data.forEach(alert => {
        const div = document.createElement('div');
        div.className = "card";

        div.innerHTML = `
            <img src="/${alert.image}" />
            <p class="time">${alert.timestamp}</p>
            <p class="status">${alert.status}</p>
        `;

        container.appendChild(div);
    });
}

// Refresh every 3 seconds
setInterval(loadAlerts, 3000);
loadAlerts();
</script>

</body>
</html>
